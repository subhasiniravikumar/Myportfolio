<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    function App() {
      const [menuOpen, setMenuOpen] = useState(false);
      const [activeSection, setActiveSection] = useState("home");
      const [darkMode, setDarkMode] = useState(localStorage.getItem("theme") === "dark");
      const [fabOpen, setFabOpen] = useState(false);
      const [formNote, setFormNote] = useState({ text: "", color: "#7b3b59" });
      const [formData, setFormData] = useState({ name: "", email: "", message: "" });
      const [counterValues, setCounterValues] = useState([0, 0, 0, 0]);

      const typingRef = useRef(null);
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const hasCounterAnimated = useRef(false);

      const navItems = useMemo(
        () => [
          { id: "home", label: "Home" },
          { id: "about", label: "Personal" },
          { id: "education", label: "Education" },
          { id: "skills", label: "Skills" },
          { id: "projects", label: "Projects" },
          { id: "achievements", label: "Achievements" },
          { id: "goals", label: "Goals" },
          { id: "contact", label: "Contact" }
        ],
        []
      );

      useEffect(() => {
        document.body.classList.toggle("dark-mode", darkMode);
        localStorage.setItem("theme", darkMode ? "dark" : "light");
      }, [darkMode]);

      useEffect(() => {
        AOS.init({ duration: 800, once: false, offset: 100, easing: "ease-in-out" });
      }, []);

      useEffect(() => {
        if (!typingRef.current) return;
        const typed = new Typed(typingRef.current, {
          strings: [
            "B.E. CSE (AIML) Student",
            "Sports Player",
            "AI Enthusiast",
            "Web Developer",
            "Quantum Explorer"
          ],
          typeSpeed: 80,
          backSpeed: 60,
          backDelay: 2000,
          loop: true,
          showCursor: true,
          cursorChar: "|"
        });

        return () => typed.destroy();
      }, []);

      useEffect(() => {
        if (!chartRef.current) return;
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = chartRef.current.getContext("2d");
        chartInstance.current = new Chart(ctx, {
          type: "radar",
          data: {
            labels: ["Python", "C/C++", "ML/AI", "Qiskit", "Web Dev", "Problem Solving"],
            datasets: [
              {
                label: "Proficiency Level",
                data: [88, 82, 84, 75, 86, 90],
                borderColor: "rgb(225, 29, 116)",
                backgroundColor: "rgba(225, 29, 116, 0.2)",
                borderWidth: 2,
                pointRadius: 5,
                pointBackgroundColor: "rgb(225, 29, 116)",
                pointHoverRadius: 7,
                fill: true,
                tension: 0.4
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
              r: {
                beginAtZero: true,
                max: 100,
                ticks: { stepSize: 20, font: { size: 12 } },
                grid: { color: "rgba(225, 29, 116, 0.1)" }
              }
            },
            plugins: { legend: { display: true, position: "bottom" } }
          }
        });

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [darkMode]);

      useEffect(() => {
        const sectionTargets = navItems.map((item) => document.getElementById(item.id)).filter(Boolean);
        const targets = [50, 2, 5, 100];

        const animateCounters = () => {
          if (hasCounterAnimated.current) return;
          const stats = document.getElementById("stats");
          if (!stats) return;
          const sectionPos = stats.getBoundingClientRect().top;
          const screenPos = window.innerHeight / 1.3;

          if (sectionPos < screenPos) {
            hasCounterAnimated.current = true;
            const duration = 1500;
            const start = performance.now();

            const frame = (now) => {
              const progress = Math.min((now - start) / duration, 1);
              setCounterValues(targets.map((t) => Math.floor(t * progress)));
              if (progress < 1) {
                requestAnimationFrame(frame);
              }
            };

            requestAnimationFrame(frame);
          }
        };

        const onScroll = () => {
          let current = "home";
          sectionTargets.forEach((section) => {
            if (window.scrollY >= section.offsetTop - 120) {
              current = section.id;
            }
          });
          setActiveSection(current);
          if (window.scrollY < 100) {
            setFabOpen(false);
          }
          animateCounters();
        };

        window.addEventListener("scroll", onScroll);
        onScroll();
        return () => window.removeEventListener("scroll", onScroll);
      }, [navItems]);

      const handleFormChange = (event) => {
        const { name, value } = event.target;
        setFormData((prev) => ({ ...prev, [name]: value }));
      };

      const handleFormSubmit = async (event) => {
        event.preventDefault();
        const isEmailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email);

        if (!formData.name.trim() || !formData.message.trim() || !isEmailValid) {
          setFormNote({ text: "Please fill all fields with valid details.", color: "#b00045" });
          return;
        }

        try {
          const response = await fetch("/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: formData.name.trim(),
              email: formData.email.trim(),
              message: formData.message.trim()
            })
          });

          const result = await response.json();
          if (!response.ok) {
            setFormNote({ text: result.message || "Unable to send message now.", color: "#b00045" });
            return;
          }

          setFormNote({ text: "Message sent successfully. Thank you!", color: "#127a40" });
          setFormData({ name: "", email: "", message: "" });
        } catch (error) {
          setFormNote({ text: "Server is not reachable. Please run backend and try again.", color: "#b00045" });
        }
      };

      const downloadResume = () => {
        const resumeContent = `
          <h1>Subhasini Ravikumar</h1>
          <h2>B.E. CSE (AIML) Student | Sports Player</h2>
          <h3>Contact Information</h3>
          <p>Email: rtsubhasini978@gmail.com | Location: Namakkal, India</p>
          <h3>Education</h3>
          <p>B.E. CSE (AIML), 3rd Year, 6th Semester<br/>K.S. Rangasamy College of Technology, Tiruchengode<br/>Future Goal: M.E. AIML in Germany</p>
          <h3>Technical Skills</h3>
          <p>Python, C, C++, Machine Learning, AI Concepts, Qiskit, Web Development</p>
          <h3>Achievements</h3>
          <p>University Gold Medalist in Weight Lifting and Cricket</p>
        `;

        const element = document.createElement("div");
        element.innerHTML = resumeContent;
        element.style.padding = "20px";
        element.style.fontFamily = "Poppins, sans-serif";

        html2pdf().set({
          margin: 10,
          filename: "Subhasini_Ravikumar_Resume.pdf",
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2 },
          jsPDF: { orientation: "portrait", unit: "mm", format: "a4" }
        }).from(element).save();
      };

      const year = new Date().getFullYear();

      return (
        <>
          <header className="navbar">
            <div className="container nav-inner">
              <a href="#home" className="brand">Subhasini Ravikumar</a>
              <button
                className="theme-toggle"
                aria-label="Toggle dark mode"
                title="Toggle dark mode"
                onClick={() => setDarkMode((prev) => !prev)}
              >
                <i className={darkMode ? "fas fa-sun" : "fas fa-moon"}></i>
              </button>
              <button className="menu-btn" aria-label="Toggle menu" onClick={() => setMenuOpen((prev) => !prev)}>
                <i className="fas fa-bars"></i>
              </button>
              <ul className={`nav-links ${menuOpen ? "open" : ""}`}>
                {navItems.map((item) => (
                  <li key={item.id}>
                    <a href={`#${item.id}`} className={activeSection === item.id ? "active" : ""} onClick={() => setMenuOpen(false)}>
                      {item.label}
                    </a>
                  </li>
                ))}
              </ul>
            </div>
          </header>

          <main>
            <section className="hero" id="home">
              <div className="container hero-grid">
                <div>
                  <h1 data-aos="fade-up">Subhasini Ravikumar</h1>
                  <h2><span ref={typingRef}></span></h2>
                  <p data-aos="fade-up" data-aos-delay="100">
                    I am Subhasini Ravikumar, an AIML student and sports player from Namakkal, India.
                    I am passionate about AI, web development, and quantum computing, and I apply the discipline of sports in every project.
                  </p>
                  <div className="hero-actions">
                    <a href="#contact" className="btn btn-primary"><i className="fa-solid fa-paper-plane"></i> Contact Me</a>
                    <a href="#projects" className="btn btn-secondary"><i className="fa-solid fa-diagram-project"></i> View Projects</a>
                  </div>
                </div>
                <div className="avatar-wrap">
                  <div className="avatar" aria-label="Profile photo placeholder">
                    <div>
                      <i className="fa-solid fa-user"></i>
                      <span>Profile Photo</span>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section className="section stats-section" id="stats">
              <div className="container">
                <div className="stats-grid">
                  <div className="stat-card" data-aos="zoom-in"><div className="stat-number">{counterValues[0]}+</div><div className="stat-label">Projects & Ideas</div></div>
                  <div className="stat-card" data-aos="zoom-in" data-aos-delay="100"><div className="stat-number">{counterValues[1]}</div><div className="stat-label">Gold Medals Won</div></div>
                  <div className="stat-card" data-aos="zoom-in" data-aos-delay="200"><div className="stat-number">{counterValues[2]}+</div><div className="stat-label">Years Learning & Growing</div></div>
                  <div className="stat-card" data-aos="zoom-in" data-aos-delay="300"><div className="stat-number">{counterValues[3]}%</div><div className="stat-label">Dedication & Passion</div></div>
                </div>
              </div>
            </section>

            <section className="section" id="about">
              <div className="container">
                <h1 className="section-title" data-aos="fade-up">Personal Information</h1>
                <p className="section-subtitle" data-aos="fade-up" data-aos-delay="100">My profile at a glance.</p>
                <article className="card" data-aos="fade-up" data-aos-delay="200">
                  <p><strong>Name:</strong> Subhasini Ravikumar</p>
                  <p><strong>Date of Birth:</strong> 18 July 2006</p>
                  <p><strong>Location:</strong> Namakkal, India</p>
                  <p><strong>Email:</strong> <a href="mailto:rtsubhasini978@gmail.com">rtsubhasini978@gmail.com</a></p>
                  <p><strong>Phone:</strong> Available on request</p>
                  <p><strong>LinkedIn / GitHub:</strong> Can be added here when available</p>
                  <div className="tags">
                    <span className="tag"><i className="fa-solid fa-cake-candles"></i> 18 July 2006</span>
                    <span className="tag"><i className="fa-solid fa-location-dot"></i> Namakkal, India</span>
                    <span className="tag"><i className="fa-solid fa-graduation-cap"></i> AIML Student</span>
                    <span className="tag"><i className="fa-solid fa-dumbbell"></i> Sports Player</span>
                  </div>
                </article>
              </div>
            </section>

            <section className="section" id="education">
              <div className="container">
                <h1 className="section-title" data-aos="fade-up">Education</h1>
                <p className="section-subtitle" data-aos="fade-up" data-aos-delay="100">Current studies and higher education goal.</p>
                <article className="card" data-aos="fade-up" data-aos-delay="200">
                  <p><strong>Current:</strong> B.E. CSE (AIML), 3rd Year, 6th Semester</p>
                  <p><strong>College:</strong> K.S. Rangasamy College of Technology, Tiruchengode</p>
                  <p><strong>Future Plan:</strong> M.E. AIML in Germany</p>
                </article>
              </div>
            </section>

            <section className="section" id="skills">
              <div className="container">
                <h1 className="section-title" data-aos="fade-up">Skills</h1>
                <p className="section-subtitle" data-aos="fade-up" data-aos-delay="100">Programming, AI/ML, web, tools, and sports strengths.</p>
                <div className="skills-chart-wrapper" data-aos="fade-up" data-aos-delay="150">
                  <canvas ref={chartRef} width="200" height="200"></canvas>
                  <p className="chart-label">Technical Proficiency Radar</p>
                </div>
                <div className="skills-grid">
                  <article className="card">
                    <h2 className="section-title" style={{ fontSize: "1.3rem", marginBottom: "16px" }}><i className="fa-solid fa-laptop-code"></i> Technical Skills</h2>
                    <div className="progress-item"><div className="progress-head"><span>Python</span><span>88%</span></div><div className="bar"><div className="fill" style={{ width: "88%" }}></div></div></div>
                    <div className="progress-item"><div className="progress-head"><span>C</span><span>82%</span></div><div className="bar"><div className="fill" style={{ width: "82%" }}></div></div></div>
                    <div className="progress-item"><div className="progress-head"><span>C++</span><span>80%</span></div><div className="bar"><div className="fill" style={{ width: "80%" }}></div></div></div>
                    <div className="progress-item"><div className="progress-head"><span>Machine Learning & AI Concepts</span><span>84%</span></div><div className="bar"><div className="fill" style={{ width: "84%" }}></div></div></div>
                    <div className="progress-item"><div className="progress-head"><span>Qiskit (Quantum Basics)</span><span>75%</span></div><div className="bar"><div className="fill" style={{ width: "75%" }}></div></div></div>
                    <div className="progress-item"><div className="progress-head"><span>HTML / CSS / JavaScript</span><span>86%</span></div><div className="bar"><div className="fill" style={{ width: "86%" }}></div></div></div>
                  </article>
                  <article className="card">
                    <h2 className="section-title" style={{ fontSize: "1.3rem", marginBottom: "16px" }}><i className="fa-solid fa-screwdriver-wrench"></i> Tools, Platforms & Sports</h2>
                    <div className="pills">
                      <span className="pill">VS Code</span><span className="pill">AWS</span><span className="pill">Git</span><span className="pill">GitHub</span>
                      <span className="pill">Cricket</span><span className="pill">Weight Lifting</span><span className="pill">Athletics</span><span className="pill">Team Coordination</span>
                    </div>
                  </article>
                </div>
              </div>
            </section>

            <section className="section" id="projects">
              <div className="container">
                <h1 className="section-title" data-aos="fade-up">Projects</h1>
                <p className="section-subtitle" data-aos="fade-up" data-aos-delay="100">Work I have built using AI, cloud, and web technologies.</p>
                <div className="skills-grid">
                  <article className="card project-card" data-aos="fade-up" data-aos-delay="150">
                    <h2 className="section-title" style={{ fontSize: "1.2rem", marginBottom: "8px" }}><i className="fa-solid fa-shirt"></i> T-shirt Design App</h2>
                    <p><strong>Tech Stack:</strong></p>
                    <div className="tech-badges"><span className="tech-badge">AWS</span><span className="tech-badge">VS Code</span><span className="tech-badge">AI/ML</span></div>
                    <p style={{ marginTop: "10px" }}><strong>Role:</strong> Designed and developed the app workflow.</p>
                    <p><strong>Description:</strong> Generates creative T-shirt design outputs from user prompts using AI-assisted logic.</p>
                  </article>
                  <article className="card project-card" data-aos="fade-up" data-aos-delay="200">
                    <h2 className="section-title" style={{ fontSize: "1.2rem", marginBottom: "8px" }}><i className="fa-solid fa-atom"></i> Quantum Circuit Simulation</h2>
                    <p><strong>Tech Stack:</strong></p>
                    <div className="tech-badges"><span className="tech-badge">Python</span><span className="tech-badge">Qiskit</span><span className="tech-badge">Quantum</span></div>
                    <p style={{ marginTop: "10px" }}><strong>Role:</strong> Implemented simulation experiments for basic quantum states.</p>
                    <p><strong>Description:</strong> Simulated simple quantum circuits to understand quantum computing fundamentals.</p>
                  </article>
                  <article className="card project-card" data-aos="fade-up" data-aos-delay="250">
                    <h2 className="section-title" style={{ fontSize: "1.2rem", marginBottom: "8px" }}><i className="fa-solid fa-globe"></i> Portfolio Website</h2>
                    <p><strong>Tech Stack:</strong></p>
                    <div className="tech-badges"><span className="tech-badge">React</span><span className="tech-badge">Node.js</span><span className="tech-badge">Express</span><span className="tech-badge">CSS3</span></div>
                    <p style={{ marginTop: "10px" }}><strong>Role:</strong> Built and improved the complete portfolio website.</p>
                    <p><strong>Live URL:</strong> <a href="http://localhost:3000/index.html" target="_blank" rel="noopener noreferrer" className="live-link"><i className="fa-solid fa-arrow-up-right-from-square"></i> Visit Site</a></p>
                  </article>
                </div>
              </div>
            </section>

            <section className="section" id="achievements">
              <div className="container">
                <h1 className="section-title" data-aos="fade-up">Achievements & Certifications</h1>
                <p className="section-subtitle" data-aos="fade-up" data-aos-delay="100">Sports milestones and ongoing certification goals.</p>
                <div className="timeline">
                  <article className="achievement" data-aos="fade-left"><h3><i className="fa-solid fa-dumbbell"></i> University Gold Medalist - Weight Lifting</h3><p>Won university gold medal in weight lifting through consistent training and high-performance execution.</p></article>
                  <article className="achievement" data-aos="fade-right"><h3><i className="fa-solid fa-trophy"></i> University Gold Medalist - Cricket</h3><p>Won university gold medal in cricket with all-round match contributions and disciplined teamwork.</p></article>
                  <article className="achievement" data-aos="fade-left"><h3><i className="fa-solid fa-medal"></i> Dual University Gold Achiever</h3><p>Recognized for securing university gold medals in both weight lifting and cricket.</p></article>
                  <article className="achievement" data-aos="fade-right"><h3><i className="fa-solid fa-certificate"></i> AI/ML, Web, and Cloud Certifications</h3><p>Actively pursuing certifications, workshops, and competitions related to AI/ML, web development, and cloud services.</p></article>
                </div>
              </div>
            </section>

            <section className="section" id="goals">
              <div className="container">
                <h1 className="section-title" data-aos="fade-up">Interests & Career Objectives</h1>
                <p className="section-subtitle" data-aos="fade-up" data-aos-delay="100">Domains I love and the roadmap I am following.</p>
                <div className="skills-grid">
                  <article className="card">
                    <h2 className="section-title" style={{ fontSize: "1.2rem", marginBottom: "8px" }}><i className="fa-solid fa-heart"></i> Interests</h2>
                    <div className="pills"><span className="pill">AI and Machine Learning</span><span className="pill">Web Development</span><span className="pill">Quantum Computing</span><span className="pill">Designing Creative Applications</span></div>
                  </article>
                  <article className="card">
                    <h2 className="section-title" style={{ fontSize: "1.2rem", marginBottom: "8px" }}><i className="fa-solid fa-bullseye"></i> Goals</h2>
                    <p><strong>Short-term:</strong> Complete B.E. CSE (AIML) with strong projects.</p>
                    <p><strong>Mid-term:</strong> Pursue M.E. AIML in Germany.</p>
                    <p><strong>Long-term:</strong> Work in AI/ML research or full-stack development with AI applications.</p>
                  </article>
                </div>
              </div>
            </section>

            <section className="section" id="contact">
              <div className="container">
                <h1 className="section-title" data-aos="fade-up">Contact</h1>
                <p className="section-subtitle" data-aos="fade-up" data-aos-delay="100">Reach out for collaboration, opportunities, or project discussions.</p>
                <div className="resume-download-area" data-aos="fade-up" data-aos-delay="150">
                  <button onClick={downloadResume} className="btn btn-resume"><i className="fa-solid fa-file-download"></i> Download Resume</button>
                </div>
                <div className="contact-grid">
                  <aside className="card">
                    <h2 className="section-title" style={{ fontSize: "1.3rem", marginBottom: "12px" }}>Contact Details</h2>
                    <ul className="contact-list">
                      <li><i className="fa-solid fa-envelope"></i><div><strong>Email:</strong><br /><a href="mailto:rtsubhasini978@gmail.com">rtsubhasini978@gmail.com</a></div></li>
                      <li><i className="fa-solid fa-phone"></i><div><strong>Phone:</strong><br />Available on request</div></li>
                      <li><i className="fa-brands fa-linkedin"></i><div><strong>LinkedIn:</strong><br />Add profile link here</div></li>
                      <li><i className="fa-brands fa-github"></i><div><strong>GitHub:</strong><br />Add profile link here</div></li>
                    </ul>
                  </aside>
                  <form className="card" onSubmit={handleFormSubmit} noValidate>
                    <div className="field"><label htmlFor="name">Name</label><input id="name" name="name" type="text" placeholder="Enter your name" value={formData.name} onChange={handleFormChange} required /></div>
                    <div className="field"><label htmlFor="email">Email</label><input id="email" name="email" type="email" placeholder="Enter your email" value={formData.email} onChange={handleFormChange} required /></div>
                    <div className="field"><label htmlFor="message">Message</label><textarea id="message" name="message" placeholder="Write your message" value={formData.message} onChange={handleFormChange} required></textarea></div>
                    <button type="submit" className="btn btn-primary"><i className="fa-solid fa-paper-plane"></i> Send Message</button>
                    <p className="form-note" style={{ color: formNote.color }}>{formNote.text}</p>
                  </form>
                </div>
              </div>
            </section>
          </main>

          <footer>
            <div className="container">&copy; {year} Subhasini Ravikumar. Built with passion in pink.</div>
          </footer>

          <div className={`fab-menu ${fabOpen ? "open" : ""}`}>
            <button className="fab-btn main-fab" title="Quick actions" onClick={() => setFabOpen((prev) => !prev)}>
              <i className="fas fa-ellipsis-v"></i>
              <span className="fab-label">Menu</span>
            </button>
            <a href="#contact" className="fab-btn" title="Contact me" onClick={() => setFabOpen(false)}>
              <i className="fas fa-envelope"></i>
              <span className="fab-label">Contact</span>
            </a>
            <button className="fab-btn" title="Scroll to top" onClick={() => { window.scrollTo({ top: 0, behavior: "smooth" }); setFabOpen(false); }}>
              <i className="fas fa-chevron-up"></i>
              <span className="fab-label">Top</span>
            </button>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
